{% load static %}
<link rel="stylesheet" href={% static "css/auth.css" %}>

<div class="auth-box">

    <a href="../../"> ←back </a>

    <h2>Change Password</h2>
    
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update Password</button>
    </form>
</div>
