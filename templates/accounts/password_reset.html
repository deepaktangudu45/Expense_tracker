
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="auth-card">
    <h2>Forgot Password</h2>
    <p>Enter your email to receive a reset link.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.email }}
        <button type="submit">Send Reset Link</button>
    </form>
</div>
{% endblock %}
