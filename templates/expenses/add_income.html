{% extends "expenses/base.html" %} 
{% load static %} 
{% block title %}Add Income{% endblock %} 
{% block content %}
<link rel="stylesheet" href="{% static 'css/forms.css' %}" />

<div class="form-container">
  <h2 class="form-title">Add Income</h2>

  <form method="POST">
    {% csrf_token %}

    <div class="form-group">
      <label for="{{ form.amount.id_for_label }}">Amount</label>
      {{ form.amount }} {{ form.amount.errors }}
    </div>

    <div class="form-group">
      <label for="{{ form.source.id_for_label }}">Source</label>
      {{ form.source }} {{ form.source.errors }}
    </div>

    <div class="form-group">
      <label for="{{ form.date.id_for_label }}">Date</label>
      {{ form.date }} {{ form.date.errors }}
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">Save Income</button>
    </div>
  </form>
</div>

{% endblock %}
