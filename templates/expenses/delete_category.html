{% extends "expenses/base.html" %}
{% load static %}
{% block title %}Delete Category{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/forms.css' %}">

<div class="form-container" style="text-align: center;">
    <h2 class="form-title" style="color: #dc3545;">Delete Category?</h2>

    <p style="font-size: 1.1rem; margin-bottom: 20px;">
        Are you sure you want to delete this category?
    </p>

    <div style="background-color: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 25px; border: 1px solid #ddd;">
        <p><strong>Category:</strong> {{ category.name }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        
        <div class="form-actions" style="justify-content: center; gap: 15px;">
            <button type="submit" class="btn-primary" style="background-color: #dc3545; border-color: #dc3545;">Yes, Delete</button>
            <a href="{% url 'category_list' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
